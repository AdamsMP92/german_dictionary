[workspace]
name = "dictionary"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.12"
pandas = "*"

[tasks]
create-dictionary = "python dictionary.py"
test = "python test.py"
generate = "bash generators/generate_all.sh"
validate = "python validate_dictionaries.py"
language-check = "python language_check.py"
